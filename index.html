<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guido IA - Panel Multi-Modon</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-gray-800 p-5 bg-gray-950 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cyan-400 tracking-wide">🧠 Guido IA <span class="text-xs text-gray-500 font-normal">v1.2 Multimedia</span></h1>
            <span class="px-3 py-1 bg-green-900/50 text-green-400 border border-green-500/30 rounded-full text-xs font-semibold">● Backend Full Online</span>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 overflow-y-auto flex flex-col gap-4" id="chat-container">
        <div class="bg-gray-800/40 border border-gray-700/50 rounded-2xl p-4 max-w-[80%] self-start shadow-sm">
            <p class="text-sm text-cyan-300 font-semibold mb-1">Guido IA</p>
            <p class="text-gray-300">¡Modo multimedia activado! Ahora podés hablarme, chatear normal o escribir <span class="text-yellow-400 font-mono font-bold">/foto [lo que quieras]</span> para que te lo dibuje al toque en pantalla.</p>
        </div>
    </main>

    <footer class="p-4 border-t border-gray-800 bg-gray-950">
        <div class="max-w-4xl mx-auto flex gap-3 items-center">
            <button id="mic-btn" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 p-3 rounded-xl transition-all h-12 w-12 flex items-center justify-center focus:outline-none">🎙️</button>
            <input type="text" id="user-input" placeholder="Chatea o usa /foto un perro astronauta..." class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-cyan-500 transition-colors h-12">
            <button id="send-btn" class="bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold px-6 py-3 rounded-xl h-12 transition-colors shadow-md">Enviar</button>
        </div>
        <div id="status-recording" class="max-w-4xl mx-auto text-xs text-red-400 mt-2 hidden animate-pulse">🔴 Grabando audio... Solta el botón para enviar.</div>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const statusRecording = document.getElementById('status-recording');

        let mediaRecorder;
        let audioChunks = [];

        // --- MANEJO DE MICRÓFONO ---
        micBtn.addEventListener('mousedown', async () => {
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    stream.getTracks().forEach(track => track.stop());
                    await enviarAudio(audioBlob);
                };
                mediaRecorder.start();
                micBtn.className = "bg-red-600 text-white scale-105 p-3 rounded-xl h-12 w-12 flex items-center justify-center focus:outline-none animate-pulse";
                statusRecording.classList.remove('hidden');
            } catch (err) { alert('Habilita los permisos del micrófono en el navegador, che.'); }
        });

        micBtn.addEventListener('mouseup', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                micBtn.className = "bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 p-3 rounded-xl h-12 w-12 flex items-center justify-center focus:outline-none";
                statusRecording.classList.add('hidden');
            }
        });

        async function enviarAudio(blob) {
            const loadingId = appendMessage('Guido IA', 'Procesando tu nota de voz...', 'self-start bg-gray-800/40 border border-gray-700/50 text-gray-400 animate-pulse');
            try {
                const formData = new FormData();
                formData.append('audio', blob);

                const response = await fetch('http://http://10.0.15.54/api/chat/api/process-audio', { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.result) {
                    appendMessage('Vos (Por Voz)', `"${data.transcription}"`, 'self-end bg-cyan-950/40 border border-cyan-800/40 text-cyan-100 italic');
                    appendMessage('Guido IA', data.result, 'self-start bg-gray-800/40 border border-gray-700/50 text-gray-200');
                    if (data.image) appendImage('Guido IA', data.image);
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('Sistema', 'Error en conexión de voz.', 'self-start bg-red-950/40 border border-red-900/50 text-red-400');
            }
        }

        // --- ENVIAR MENSAJE (TEXTO O COMANDO /FOTO) ---
        async function handleSend() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            userInput.value = '';

            // ¿Es un comando de foto?
            if (prompt.startsWith('/foto ')) {
                const descripcionFoto = prompt.replace('/foto ', '').trim();
                appendMessage('Vos', `📸 Solicitaste imagen: "${descripcionFoto}"`, 'self-end bg-purple-950/40 border border-purple-800/40 text-purple-100');
                
                const loadingId = appendMessage('Guido IA', 'Pintando tu cuadro en la nube con GPUs...', 'self-start bg-gray-800/40 border border-gray-700/50 text-gray-400 animate-pulse');
                
                try {
                    const response = await fetch('http://http://http://10.0.15.54/api/chat/api/process-audio/api/generate-image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: descripcionFoto })
                    });
                    const data = await response.json();
                    document.getElementById(loadingId).remove();

                    if (data.image) {
                        appendMessage('Guido IA', '¡Listo jefe! Cuadro terminado:', 'self-start bg-gray-800/40 border border-gray-700/50 text-gray-200');
                        appendImage('Guido IA', data.image);
                    }
                } catch (e) {
                    document.getElementById(loadingId).remove();
                    appendMessage('Sistema', 'Error al renderizar la imagen.', 'self-start bg-red-950/40 border border-red-900/50 text-red-400');
                }
            } else {
                // Chat normal por texto
                appendMessage('Vos', prompt, 'self-end bg-cyan-950/40 border border-cyan-800/40 text-cyan-100');
                const loadingId = appendMessage('Guido IA', 'Pensando...', 'self-start bg-gray-800/40 border border-gray-700/50 text-gray-400 animate-pulse');
                
                try {
                    const response = await fetch('http://http://10.0.15.54/api/chat/api/process-audio/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });
                    const data = await response.json();
                    document.getElementById(loadingId).remove();
                    if (data.result) appendMessage('Guido IA', data.result, 'self-start bg-gray-800/40 border border-gray-700/50 text-gray-200');
                } catch (e) {
                    document.getElementById(loadingId).remove();
                    appendMessage('Sistema', 'Error de conexión.', 'self-start bg-red-950/40 border border-red-900/50 text-red-400');
                }
            }
        }

        function appendMessage(sender, text, classes) {
            const id = 'msg-' + Date.now();
            const msgHtml = `
                <div id="${id}" class="${classes} rounded-2xl p-4 max-w-[80%] shadow-sm transition-all duration-300">
                    <p class="text-xs font-bold ${sender.includes('Vos') ? 'text-cyan-400' : 'text-purple-400'} mb-1">${sender}</p>
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', msgHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function appendImage(sender, src) {
            const imgHtml = `
                <div class="self-start bg-gray-800/40 border border-gray-700/50 rounded-2xl p-2 max-w-[350px] shadow-md transition-all duration-300">
                    <img src="${src}" class="rounded-xl w-full object-cover border border-gray-700 shadow-inner" alt="IA Image" loading="lazy">
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', imgHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
