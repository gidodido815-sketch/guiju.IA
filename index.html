<script>
    // URL FIJA DE NGROK CONECTADA A TU SERVIDOR LOCAL (PUERTO 3001)
    const BACKEND_URL = 'https://omnificent-leonida-kindheartedly.ngrok-free.dev';

    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const recordBtn = document.getElementById('record-btn');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    // Función para agregar mensajes a la pantalla
    function addMessage(text, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        messageDiv.textContent = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // FUNCIÓN DEL CHAT (CONECTADO A NGROK)
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, true);
        userInput.value = '';

        try {
            const response = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: { '腔ontent-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            addMessage(data.reply, false);
        } catch (error) {
            console.error('Error:', error);
            addMessage('Error al conectar con el servidor de IA local.', false);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // FUNCIÓN DE AUDIO (CONECTADO A NGROK)
    recordBtn.addEventListener('click', async () => {
        if (!isRecording) {
            // Iniciar grabación
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const formData = new FormData();
                formData.append('audio', audioBlob);

                addMessage('🎙️ Procesando audio...', false);

                try {
                    const response = await fetch(`${BACKEND_URL}/api/process-audio`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    // Borramos el cartel de procesando y ponemos la transcripción + respuesta
                    chatMessages.removeChild(chatMessages.lastChild);
                    addMessage(`📝 Dijiste: ${data.transcription}`, true);
                    addMessage(data.reply, false);
                } catch (error) {
                    console.error('Error de audio:', error);
                    chatMessages.removeChild(chatMessages.lastChild);
                    addMessage('Error al procesar el archivo de voz.', false);
                }
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.textContent = '🛑 Detener';
            recordBtn.style.backgroundColor = '#ef4444';
        } else {
            // Detener grabación
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.textContent = '🎙️ Grabar';
            recordBtn.style.backgroundColor = '#3b82f6';
        }
    });
</script>
